name: 自动构建与发布

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Gradle构建项目
        run: ./gradlew build --no-daemon

      - name: 验证构建结果
        run: |
          if [ ! -d "build" ]; then
            echo "::error::构建失败，未生成build目录"
            exit 1
          fi
          echo "=== 构建产物 ==="
          ls -lh ReCatSeedLogin-bukkit/build/libs/

      - name: 获取提交信息
        id: get-commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:%B)
          echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 计算文件哈希
        id: file-hashes
        run: |
          set -euo pipefail
          echo "## 📦 文件校验哈希" > hashes.md
          echo '```' >> hashes.md
          found_files=false
          for file in ReCatSeedLogin-bukkit/build/libs/*.jar; do
            if [[ -f "$file" ]]; then
              hash=$(sha256sum "$file" | awk '{print $1}')
              filename=$(basename "$file")
              echo "${filename}: ${hash}" >> hashes.md
              found_files=true
            fi
          done
          if [[ "$found_files" == false ]]; then
            echo "::warning::未找到可校验文件"
            echo "hash_content=未生成校验信息" >> $GITHUB_OUTPUT
          else
            echo '```' >> hashes.md
            echo "hash_content<<EOF" >> $GITHUB_OUTPUT
            cat hashes.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: 记录构建时间
        id: get-date
        run: |
          echo "date=$(date +'%Y年%m月%d日 %H时%M分%S秒')" >> $GITHUB_OUTPUT

      - name: 创建版本发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: ReCatSeedLogin-v1.0.0
          body: |
            ## 📝 提交信息
            ```
            ${{ steps.get-commit.outputs.commit_msg }}
            ```

            ## 🔧 构建详情
            - 项目名称: ReCatSeedLogin
            - 版本号: 1.0.0
            - 提交哈希: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - 构建时间: ${{ steps.get-date.outputs.date }}

            ## 🔍 文件校验
            ${{ steps.file-hashes.outputs.hash_content }}

            > 本发布由 GitHub Actions 自动生成
          files: |
            ReCatSeedLogin-bukkit/build/libs/*.jar
            ReCatSeedLogin-bungee/build/libs/*.jar
            ReCatSeedLogin-velocity/build/libs/*.jar
          draft: false
          prerelease: false